<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07071a"/>
      <stop offset="50%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Декоративные линии -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="url(#accent)" stroke-width="0.5" opacity="0.3"/>
  <line x1="800" y1="530" x2="1200" y2="530" stroke="url(#accent2)" stroke-width="0.5" opacity="0.3"/>

  <!-- Частицы -->
  <circle cx="150" cy="120" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="950" cy="90" r="1.5" fill="#a78bfa" opacity="0.3"/>
  <circle cx="300" cy="480" r="2.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="1050" cy="500" r="1.5" fill="#6366f1" opacity="0.3"/>
  <circle cx="80" cy="350" r="1" fill="#a78bfa" opacity="0.3"/>
  <circle cx="1120" cy="300" r="2" fill="#8b5cf6" opacity="0.2"/>

  <!-- Иконка/логотип -->
  <g transform="translate(600, 180)" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-12-16L-22-11l10 5 10-5-10-5z" opacity="0.6"/>
    <path d="M-22-1l10 5 10-5" opacity="0.6"/>
    <path d="M-22-6l10 5 10-5" opacity="0.6"/>
    <path d="M-12-16L-22-11l10 5 10-5-10-5z" transform="translate(0,10)" opacity="0.3"/>
    <path d="M-22-1l10 5 10-5" transform="translate(0,10)" opacity="0.3"/>
    <path d="M-22-6l10 5 10-5" transform="translate(0,10)" opacity="0.3"/>
  </g>

  <!-- Текст -->
  <text x="600" y="290" text-anchor="middle" fill="url(#accent)" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="-1">SEO Анализатор</text>
  <text x="600" y="340" text-anchor="middle" fill="#8888a8" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" letter-spacing="0.5">Проверка мета-тегов, Open Graph и Twitter Cards</text>

  <!-- Прямоугольная рамка с баллом -->
  <rect x="480" y="370" width="240" height="60" rx="12" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="600" y="408" text-anchor="middle" fill="#a78bfa" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="600">Бесплатный онлайн-анализ</text>
</svg>
